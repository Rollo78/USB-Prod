name: Build AMTEQ Produktions-App APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Find Gradle project
        shell: bash
        run: |
          PROJECT_DIR=$(dirname "$(find . -name settings.gradle -o -name settings.gradle.kts | head -n 1)")
          if [ -z "$PROJECT_DIR" ]; then echo "Kein settings.gradle gefunden"; exit 1; fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Gradle Projektordner: $PROJECT_DIR"
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Build debug APK
        shell: bash
        run: |
          cd "$PROJECT_DIR"
          gradle --no-daemon assembleDebug --stacktrace
      - name: Locate APK
        shell: bash
        run: |
          APK_FILE=$(find "$PROJECT_DIR" -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then echo "Keine APK gefunden"; find "$PROJECT_DIR" -type f | sort; exit 1; fi
          mkdir -p "$GITHUB_WORKSPACE/apk-output"
          cp "$APK_FILE" "$GITHUB_WORKSPACE/apk-output/AMTEQ-Produktion-debug.apk"
          ls -la "$GITHUB_WORKSPACE/apk-output"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AMTEQ-ProduktionsApp-5046-debug-apk
          path: apk-output/AMTEQ-Produktion-debug.apk
          if-no-files-found: error
